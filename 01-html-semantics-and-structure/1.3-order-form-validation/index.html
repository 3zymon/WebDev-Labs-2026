<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formularz zamówienia</title>
</head>
<body>
    <h1>Formularz zamówienia</h1>

  <form>
    <div>
        <label for="product">Wybierz produkt:</label>
        <select id="product" name="product" required>
            <option value="p1">Produkt 1</option>
            <option value="p2">Produkt 2</option>
            <option value="p3">Produkt 3</option>
        </select>
    </div>

    <div>
        <label for="quantity">Ilość (1-10):</label>
        <input type="number" id="quantity" name="quantity" min="1" max="10"
            required>
    </div>

    <div>
        <label for="phone">Numer telefonu (format +48 123-456-789):</label>
        <input type="tel" id="phone" name="phone" 
            pattern="\+48 [0-9]{3}-[0-9]{3}-[0-9]{3}" 
            placeholder="+48 123-456-789"
            required>
    </div>
    
    <button type="submit">Zamów</button>
  </form>
</body>
</html>
