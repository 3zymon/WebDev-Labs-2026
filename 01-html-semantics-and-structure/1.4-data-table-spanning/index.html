<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabela z danymi</title>
</head>
<body>
    <table border="1">

        <tr><!--rzad-->
            <th>Imię</th><!--naglowek-->
            <th>Wiek</th>
            <th>Miasto</th>
        </tr>

        <tr>
            <td>Jan</td><!--komorka-->
            <td>25</td>
            <td rowspan="2">Warszawa</td>
        </tr>

        <tr>
            <td>Anna</td>
            <td>30</td>
        </tr>

        <tr>
            <td colspan="2">Łączna liczba osób</td>
            <td>2</td>
        </tr>
    </table>
</body>
</html>
