<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strona osobista</title>
</head>
<body>
    <header>
        <h1>Jan Kowalski</h1>
        <p> Web Developer | Freelancer</p>

        <nav>
            <a href="#">O mnie</a>
            <a href="#">Kontakt</a>
        </nav>
    </header>
    

    <main>
        <section>
            <h2> O mnie</h2>
            <p>Cześć! Jestem Jan, pasjonat technologii webowych. Tworzę nowoczesne strony interntowe.</p>
        </section>

        <section>
            <h2>Kontakt</h2>

            <form>
                <label for="username">Imię i nazwisko:</label>
                <input type="text" id="username" name="username"
                required>

                <label for="email">Email:</label>
                <input type="email" id="email" name="email"
                required>

                <label for="msg">Wiadomość:</label>
                <textarea id="msg" type="message"
                required></textarea>

                <button type="submit">Wyślij wiadomość</button>
            </form>
        </section>
    </main>

    <footer>
        <p>@ 2025 Jan Kowalski. Wszelkie prawa zastrzeżone.</p>
    </footer>
</body>
</html>
